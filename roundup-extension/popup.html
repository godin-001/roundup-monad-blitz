<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>RoundUp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      background: #0a0a0f;
      color: #e2e2e2;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .header h1 { font-size: 20px; color: #fff; }
    .header span { font-size: 24px; }
    .tagline { font-size: 11px; color: #836ef9; margin-top: 2px; }

    .card {
      background: #13131e;
      border: 1px solid #222238;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .card-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .card-value {
      font-size: 30px;
      font-weight: 700;
      color: #836ef9;
    }
    .card-value.green { color: #4ade80; }
    .card-value.purple { color: #c084fc; }

    .card-sub {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .invest-card {
      background: #13131e;
      border: 1.5px solid #836ef9;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .arrow-row {
      text-align: center;
      font-size: 18px;
      color: #4ade80;
      margin: -4px 0 6px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #connectBtn {
      background: #836ef9;
      color: #fff;
    }
    #investBtn {
      background: #4ade80;
      color: #000;
      display: none;
    }

    #status {
      font-size: 12px;
      color: #4ade80;
      margin-top: 10px;
      text-align: center;
      min-height: 18px;
      word-break: break-all;
    }
    #status.error { color: #f87171; }

    .wallet-row {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #555;
      margin-bottom: 10px;
      background: #13131e;
      border-radius: 8px;
      padding: 8px 12px;
    }
    .wallet-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .input-row input {
      flex: 1;
      padding: 10px 12px;
      background: #13131e;
      border: 1px solid #222238;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
    }
    .input-row input:focus {
      outline: none;
      border-color: #836ef9;
    }
    .input-row label {
      font-size: 11px;
      color: #666;
      align-self: center;
    }

    .divider {
      border: none;
      border-top: 1px solid #1e1e2e;
      margin: 12px 0;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }
    .stat-row span:last-child { color: #836ef9; }
  </style>
</head>
<body>

  <div class="header">
    <span>💜</span>
    <div>
      <h1>RoundUp</h1>
      <div class="tagline">Powered by Monad Testnet</div>
    </div>
  </div>

  <!-- Wallet info row -->
  <div class="wallet-row" id="walletRow">
    <div class="wallet-dot"></div>
    <span id="walletAddr">0x...</span>
  </div>

  <!-- Manual amount input -->
  <div class="input-row">
    <label>Monto $</label>
    <input type="number" id="amountInput" placeholder="13.44" step="0.01" min="0" value="13.44" />
  </div>

  <!-- Original amount -->
  <div class="card">
    <div class="card-label">💳 Pago detectado</div>
    <div class="card-value" id="originalVal">$13.44</div>
  </div>

  <div class="arrow-row">↓ redondeo</div>

  <!-- Rounded -->
  <div class="card">
    <div class="card-label">🎯 Redondeado a</div>
    <div class="card-value green" id="roundedVal">$14.00</div>
    <div class="card-sub">Siguiente número entero</div>
  </div>

  <hr class="divider" />

  <!-- Investment -->
  <div class="invest-card">
    <div class="card-label">✨ Tu inversión en Monad</div>
    <div class="card-value purple" id="investVal">$0.56</div>
    <div class="card-sub">≈ <span id="monVal">0.0000</span> MON testnet</div>
    <div class="stat-row">
      <span>Invertido total (sesión)</span>
      <span id="sessionTotal">0 MON</span>
    </div>
  </div>

  <!-- Buttons -->
  <button id="connectBtn">🔌 Conectar MetaMask</button>
  <button id="investBtn">🚀 Invertir cambio ahora</button>

  <div id="status"></div>

  <script src="ethers.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
